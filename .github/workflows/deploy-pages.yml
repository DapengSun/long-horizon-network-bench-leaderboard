name: Deploy leaderboard to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      data_mode:
        description: "Leaderboard data mode to publish"
        required: true
        default: "fake"
        type: choice
        options:
          - fake
          - real

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate leaderboard data
        run: npm run generate:data -- --mode "${LEADERBOARD_DATA_MODE}"
        env:
          LEADERBOARD_DATA_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.data_mode || 'fake' }}

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_LEADERBOARD_DATA_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.data_mode || 'fake' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
