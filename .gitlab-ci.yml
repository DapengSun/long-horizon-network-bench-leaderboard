image: node:20

stages:
  - test
  - deploy

cache:
  key:
    files:
      - site/package-lock.json
  paths:
    - site/.npm/

test:
  stage: test
  script:
    - cd site
    - npm ci --cache .npm --prefer-offline
    - npm test
    - npm run build

pages:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - cd site
    - npm ci --cache .npm --prefer-offline
    - VITE_BASE_PATH="/${CI_PROJECT_NAME}/" npm run build
    - cd ..
    - rm -rf public
    - cp -r site/dist public
  artifacts:
    paths:
      - public
